<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Personal Assistant Masterclass - Scrollable Slides</title>
  <style>
    :root {
      --paper: #fbf6ec;
      --porcelain: #fffdf8;
      --ink: #1f1713;
      --umber: #5e5047;
      --line: #e5d7c3;
      --blue: #3b6e8f;
      --copper: #8f4e24;
      --mono: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--paper);
      color: var(--ink);
      font: 18px/1.6 var(--sans);
    }

    body {
      margin: 0;
    }

    header,
    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    header {
      padding: 40px 0 22px;
      border-bottom: 1px solid var(--line);
    }

    a {
      color: var(--blue);
      text-underline-offset: 3px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--copper);
      font: 750 0.74rem/1.2 var(--mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      max-width: 820px;
      font-size: clamp(2.1rem, 7vw, 3.8rem);
      line-height: 1.04;
      letter-spacing: 0;
    }

    p {
      max-width: 760px;
      margin: 0 0 14px;
      color: var(--umber);
    }

    main {
      padding: 30px 0 60px;
    }

    .slide-list {
      display: grid;
      gap: 28px;
    }

    figure {
      margin: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--porcelain);
      box-shadow: 0 16px 34px rgba(31, 23, 19, 0.08);
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 6px;
      background: #fff;
    }

    figcaption {
      padding: 10px 2px 0;
      color: var(--umber);
      font: 650 0.78rem/1.2 var(--mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <header>
    <p class="eyebrow">Workshop slides</p>
    <h1>AI Personal Assistant Masterclass</h1>
    <p>The full deck as one scrollable page, so you can review the material any time without opening PowerPoint.</p>
  </header>

  <main>
    <div class="slide-list" aria-label="Slides">
      <figure id="slide-01"><img src="slides-assets/slide-01.png" alt="Slide 1"><figcaption>Slide 01</figcaption></figure>
      <figure id="slide-02"><img src="slides-assets/slide-02.png" alt="Slide 2"><figcaption>Slide 02</figcaption></figure>
      <figure id="slide-03"><img src="slides-assets/slide-03.png" alt="Slide 3"><figcaption>Slide 03</figcaption></figure>
      <figure id="slide-04"><img src="slides-assets/slide-04.png" alt="Slide 4"><figcaption>Slide 04</figcaption></figure>
      <figure id="slide-05"><img src="slides-assets/slide-05.png" alt="Slide 5"><figcaption>Slide 05</figcaption></figure>
      <figure id="slide-06"><img src="slides-assets/slide-06.png" alt="Slide 6"><figcaption>Slide 06</figcaption></figure>
      <figure id="slide-07"><img src="slides-assets/slide-07.png" alt="Slide 7"><figcaption>Slide 07</figcaption></figure>
      <figure id="slide-08"><img src="slides-assets/slide-08.png" alt="Slide 8"><figcaption>Slide 08</figcaption></figure>
      <figure id="slide-09"><img src="slides-assets/slide-09.png" alt="Slide 9"><figcaption>Slide 09</figcaption></figure>
      <figure id="slide-10"><img src="slides-assets/slide-10.png" alt="Slide 10"><figcaption>Slide 10</figcaption></figure>
      <figure id="slide-11"><img src="slides-assets/slide-11.png" alt="Slide 11"><figcaption>Slide 11</figcaption></figure>
      <figure id="slide-12"><img src="slides-assets/slide-12.png" alt="Slide 12"><figcaption>Slide 12</figcaption></figure>
      <figure id="slide-13"><img src="slides-assets/slide-13.png" alt="Slide 13"><figcaption>Slide 13</figcaption></figure>
      <figure id="slide-14"><img src="slides-assets/slide-14.png" alt="Slide 14"><figcaption>Slide 14</figcaption></figure>
      <figure id="slide-15"><img src="slides-assets/slide-15.png" alt="Slide 15"><figcaption>Slide 15</figcaption></figure>
      <figure id="slide-16"><img src="slides-assets/slide-16.png" alt="Slide 16"><figcaption>Slide 16</figcaption></figure>
      <figure id="slide-17"><img src="slides-assets/slide-17.png" alt="Slide 17"><figcaption>Slide 17</figcaption></figure>
      <figure id="slide-18"><img src="slides-assets/slide-18.png" alt="Slide 18"><figcaption>Slide 18</figcaption></figure>
      <figure id="slide-19"><img src="slides-assets/slide-19.png" alt="Slide 19"><figcaption>Slide 19</figcaption></figure>
      <figure id="slide-20"><img src="slides-assets/slide-20.png" alt="Slide 20"><figcaption>Slide 20</figcaption></figure>
      <figure id="slide-21"><img src="slides-assets/slide-21.png" alt="Slide 21"><figcaption>Slide 21</figcaption></figure>
      <figure id="slide-22"><img src="slides-assets/slide-22.png" alt="Slide 22"><figcaption>Slide 22</figcaption></figure>
      <figure id="slide-23"><img src="slides-assets/slide-23.png" alt="Slide 23"><figcaption>Slide 23</figcaption></figure>
      <figure id="slide-24"><img src="slides-assets/slide-24.png" alt="Slide 24"><figcaption>Slide 24</figcaption></figure>
      <figure id="slide-25"><img src="slides-assets/slide-25.png" alt="Slide 25"><figcaption>Slide 25</figcaption></figure>
      <figure id="slide-26"><img src="slides-assets/slide-26.png" alt="Slide 26"><figcaption>Slide 26</figcaption></figure>
    </div>
  </main>
</body>
</html>
