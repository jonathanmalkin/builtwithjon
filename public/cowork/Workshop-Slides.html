<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Personal Assistant Masterclass - Scrollable Slides</title>
  <style>
    :root {
      --paper: #fbf6ec;
      --porcelain: #fffdf8;
      --ink: #1f1713;
      --umber: #5e5047;
      --line: #e5d7c3;
      --blue: #3b6e8f;
      --copper: #8f4e24;
      --mono: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--paper);
      color: var(--ink);
      font: 18px/1.6 var(--sans);
    }

    body {
      margin: 0;
    }

    .page-head,
    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    .page-head {
      padding: 40px 0 22px;
      border-bottom: 1px solid var(--line);
    }

    a {
      color: var(--blue);
      text-underline-offset: 3px;
    }

    .bwj-header { border-bottom: 1px solid var(--line); background: var(--porcelain); }
    .bwj-header nav { width: min(1120px, calc(100% - 40px)); margin: 0 auto; min-height: 60px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
    .bwj-brand { font-weight: 750; color: var(--ink); text-decoration: none; margin-right: auto; }
    .bwj-nav { display: flex; gap: 18px; flex-wrap: wrap; }
    .bwj-nav a { color: var(--umber); text-decoration: none; font-size: 0.92rem; }
    .bwj-nav a:hover { color: var(--blue); }
    .bwj-social { display: flex; gap: 12px; align-items: center; }
    .bwj-social a { color: var(--umber); display: inline-flex; }
    .bwj-social a:hover { color: var(--blue); }
    .bwj-footer { border-top: 1px solid var(--line); margin-top: 48px; padding: 28px 0; text-align: center; color: var(--umber); font-size: 0.9rem; }
    .bwj-footer .bwj-social { justify-content: center; margin-bottom: 12px; }
    .bwj-flegal { display: flex; gap: 16px; justify-content: center; margin-bottom: 8px; }
    .bwj-flegal a { color: var(--umber); text-decoration: none; }
    .bwj-footer p { margin: 0; }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--copper);
      font: 750 0.74rem/1.2 var(--mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      max-width: 820px;
      font-size: clamp(2.1rem, 7vw, 3.8rem);
      line-height: 1.04;
      letter-spacing: 0;
    }

    p {
      max-width: 760px;
      margin: 0 0 14px;
      color: var(--umber);
    }

    main {
      padding: 30px 0 60px;
    }

    .slide-list {
      display: grid;
      gap: 28px;
    }

    figure {
      margin: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--porcelain);
      box-shadow: 0 16px 34px rgba(31, 23, 19, 0.08);
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 6px;
      background: #fff;
    }

    figcaption {
      padding: 10px 2px 0;
      color: var(--umber);
      font: 650 0.78rem/1.2 var(--mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
